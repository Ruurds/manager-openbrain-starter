name: Repo Hygiene

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate Scaffold
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Run repo hygiene checks
        run: scripts/validate_repo_hygiene.py

      - name: Compile Python scripts
        run: python -m compileall -q scripts

      - name: Run local-only startup check
        run: scripts/openbrain_morning_start.py --skip-docker --skip-qdrant --no-report
